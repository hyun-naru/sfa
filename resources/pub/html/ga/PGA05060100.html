<div class="section">
  <h1 class="tit01">인사 관리</h1>
  <ul class="formList div3">
    <li class="oneThirdDiv">
      <div class="th">대리점</div>
      <div class="td">
        <select class="ipt">
          <option selected="">전체</option>
          <option></option>
        </select>
      </div>
    </li>
    <li class="twoThirdsDiv">
      <div class="th">지점</div>
      <div class="td">
        <select class="ipt mid">
          <option selected="">전체</option>
          <option></option>
        </select>
      </div>
    </li>
    <li class="oneThirdDiv">
      <div class="th">권한</div>
      <div class="td">
        <select class="ipt">
          <option selected="">전체</option>
          <option></option>
        </select>
      </div>
    </li>
    <li class="twoThirdsDiv">
      <div class="th">상태</div>
      <div class="td">
        <ul class="iptGroup">
          <li>
            <input type="checkbox" class="ipt" name="chk2" id="chk2_1" checked="">
            <label for="chk2_1">정상</label>
          </li>
          <li>
            <input type="checkbox" class="ipt" name="chk2" id="chk2_2">
            <label for="chk2_2">중지</label>
          </li>
          <li>
            <input type="checkbox" class="ipt" name="chk2" id="chk2_3">
            <label for="chk2_3">잠금</label>
          </li>
          <li>
            <input type="checkbox" class="ipt" name="chk2" id="chk2_4">
            <label for="chk2_4">해촉</label>
          </li>
        </ul>
      </div>
    </li>
    <li class="full abs">
      <div class="th">위촉 기간</div>
        <div class="td">
          <div class="setHalf">
            <input type="text" class="ipt date" placeholder="YYYY.MM.DD" id="ID_Setting_Plz">
            <span class="sign">~</span>
            <input type="text" class="ipt date" placeholder="YYYY.MM.DD" id="ID_Setting_Plz">
          </div>
          <ul class="iptFilt">
            <li>
              <input type="radio" class="ipt" name="filter10" id="filter10_1" checked>
              <label for="filter10_1">1주일</label>
            </li>
            <li>
              <input type="radio" class="ipt" name="filter10" id="filter10_2">
              <label for="filter10_2">1개월</label>
            </li>
            <li>
              <input type="radio" class="ipt" name="filter10" id="filter10_3">
              <label for="filter10_3">3개월</label>
            </li>
            <li>
              <input type="radio" class="ipt" name="filter10" id="filter10_4">
              <label for="filter10_4">6개월</label>
            </li>
          </ul>
        </div>
    </li>
    <li class="full abs">
      <div class="th">검색어</div>
      <div class="td">
        <select class="ipt min">
          <option selected="">이름</option>
          <option selected="">사번</option>
        </select>
        <input type="text" class="ipt" placeholder="예 : 김하나">
        <!-- <input type="text" class="ipt" placeholder="예 : 012345"> -->
      </div>
    </li>
  </ul>

  <div class="btn_wrap">
    <button type="button" class="btn_white xl">초기화</button>
    <button type="button" class="btn_primary xl">조회</button>
  </div>

  <div class="sort_wrap">
    <div class="sort">
      <ul class="count">
        <li>총 <span class="count_num count_num_accent">106</span>건</li>
        <li><span class="count_num count_num_accent">1</span>/100페이지</li>
      </ul>
    </div>
  </div>

        <col style="width: 20%;">
        <col style="width: 10%;">

        <col style="width: auto;">
        <col style="width: 10%;">
        <col style="width: 15%;">
        <col style="width: 15%;">
      </colgroup>
      <thead>
        <tr>

          <th scope="col"><span>권한</span></th>
          <th scope="col"><span>대리점</span></th>
          <th scope="col"><span>지점</span></th>

          <th scope="col"><span>위촉일</span></th>

      <button type="button" class="btn_primary_reverse l">엑셀다운로드</button>
