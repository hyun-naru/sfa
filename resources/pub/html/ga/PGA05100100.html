<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
 	<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>조직 변경 대상자 DB 업로드</title>
  <link rel="stylesheet" href="../../css/main.css">
  <script type="text/javascript" src="../../js/pub.include.js"></script><!-- 퍼블리싱 (html) 에서만 사용하는 코드입니다. 실제 개발 페이지에선 사용하면 안됨 -->
  <script type="text/javascript" src="../../js/ui.common.js"></script>
</head>

<body>
  <div class="wrapper">
    <div class="header"></div>

    <!-- container (s) -->
    <div class="container" id="content">
<!-- ★★★★ 퍼블리셔 페이지 내용 시작 (s) -->
    <div class="section">
      <h1 class="tit01 mb0">조직 변경 대상자 DB 업로드</h1>

      <div class="tit_btnR">
        <button type="button" class="btn_white_round m">양식 다운로드</button>
      </div>
      <ul class="formList">
        <li>
          <div class="th">파일 첨부</div>
          <div class="td">
            <div class="file_area">
              <button type="button" class="btn_white s">파일첨부</button>
              <div class="file_list div2">
                <div class="noice_area">
                  <span class="icon file"></span>
                  첨부파일명1
                  <span class="icon close"></span>
                </div>
                <div class="noice_area">
                  <span class="icon file"></span>
                  첨부파일명1
                  <span class="icon close"></span>
                </div>
              </div>
            </div>
        </li>
      </ul>

      <div class="bgskyblue round">
        <span class="info_txt">업로드 관련 정책, 건수/용량 제한, 기타 주의사항입니다.</span>
      </div>

      <div class="btn_wrap">
        <button type="button" class="btn_primary xxl">무결성 검증</button>
      </div>

      <div class="tableTotal_Wrap mt80">
      <div class="tableTotal count3">
        <div class="countWrap">
          <div class="countWrap_tit">총수량</div>
          <div class="countWrap_desc"><span class="fontColor1">12,345</span>건</div>
        </div>
        <div class="countWrap">
          <div class="countWrap_tit">정상</div>
          <div class="countWrap_desc"><span>12,345</span>건</div>
        </div>
        <div class="countWrap">
          <div class="countWrap_tit">오류</div>
          <div class="countWrap_desc">
            <a href="#" class="tooltipTextWrap">
              <span class="pointC2 under_line">3건</span>
              <div class="toolTip">3행, 12행, 15행</div>
            </a></div>
          </div>
        </div>
      </div>
    </div>


      <div class="btn_wrap">
        <button type="button" class="btn_primary">업로드 실행</button>
      </div>


    </div>
<!-- ★★★★ 퍼블리셔 페이지 내용 끝 (e) -->
</div><!-- container (e) -->
<!-- 22.07.21 개발이슈로 footer 삭제 -->
<!-- <div class="footer"></div> -->
</div>
</body>

</html>
